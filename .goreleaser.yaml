version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/dotular
    binary: dotular
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: atomikpanda
      name: dotular
    directory: Formula
    homepage: "https://github.com/atomikpanda/dotular"
    description: "A config-driven dotfile manager"
    license: "MIT"
    test: |
      system "#{bin}/dotular", "platform"
    install: |
      bin.install "dotular"
